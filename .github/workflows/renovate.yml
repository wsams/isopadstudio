name: Renovate

on:
  schedule:
    # Every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.19
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          # Use GitHub platform automerge (requires "Allow auto-merge" in repo settings).
          LOG_LEVEL: info
