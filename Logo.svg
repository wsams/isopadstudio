<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 54 54" width="54" height="54" role="img" aria-labelledby="logo-title">
  <title id="logo-title">IsoPad Studio Pro</title>
  <desc>IPS monogram with centered pad motif on a coral rounded tile.</desc>
  <defs>
    <linearGradient id="ips-face" gradientUnits="userSpaceOnUse" x1="4" y1="2" x2="50" y2="52">
      <stop offset="0" stop-color="#ff5a76"/>
      <stop offset="0.52" stop-color="#ff7a59"/>
      <stop offset="1" stop-color="#e83d5c"/>
    </linearGradient>
    <linearGradient id="ips-sheen" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="36" y2="40">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="54" height="54" rx="15" ry="15" fill="url(#ips-face)"/>
  <rect width="54" height="54" rx="15" ry="15" fill="url(#ips-sheen)"/>
  <rect x="0.5" y="0.5" width="53" height="53" rx="14.5" ry="14.5" fill="none" stroke="#ffffff" stroke-opacity="0.22"/>
  <rect x="4" y="4" width="46" height="46" rx="11" ry="11" fill="none" stroke="#ffffff" stroke-opacity="0.28"/>

  <text
    x="27"
    y="26"
    text-anchor="middle"
    font-family="Arial Black, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="15.5"
    font-weight="900"
    letter-spacing="-0.02em"
  >
    <tspan fill="#ffffff">IP</tspan><tspan fill="#ffd090" dx="-0.15">S</tspan>
  </text>

  <g transform="translate(20.8 35.2)">
    <rect width="3.6" height="3.6" rx="0.9" fill="#ffffff"/>
    <rect x="5.2" width="3.6" height="3.6" rx="0.9" fill="#ffffff" opacity="0.75"/>
    <rect y="5.2" width="3.6" height="3.6" rx="0.9" fill="#ffffff" opacity="0.75"/>
    <rect x="5.2" y="5.2" width="3.6" height="3.6" rx="0.9" fill="#ffffff" opacity="0.48"/>
  </g>
</svg>
